<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TALE-STARS</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(to bottom, #0a0f2c, #000000);
            font-family: Arial, sans-serif;
            color: white;
        }

        .banner {
            width: 100%;
            text-align: center;
            padding: 10px 0;
        }

        .banner img {
            max-width: 100%;
            height: auto;
        }

        .content {
            position: absolute;
            bottom: 20px;
            left: 20px;
            max-width: 400px;
        }

        .content h1 {
            margin: 0 0 10px 0;
        }

        .content p {
            margin: 0;
            line-height: 1.5;
        }

        .links {
            margin-top: 10px;
        }

        .links a {
            color: #4da6ff;
            text-decoration: none;
            margin-right: 10px;
        }

        .links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="banner">
        <img src="logo.png" alt="TALE-STARS Logo">
    </div>

    <div class="content">
        <h1>Tale Stars</h1>
        <p>
            Tale Stars is a mod developed for Brawl Stars. It has a free test version as well as paid features.
        </p>
        <div class="links">
            <a href="#">Discord</a>
            <a href="#">Telegram</a>
        </div>
    </div>

</body>
</html>
