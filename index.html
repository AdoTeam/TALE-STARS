<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tale Stars</title>

<style>
body {
    margin: 0;
    padding: 0;
    background: linear-gradient(to bottom, #0a1020, #000000);
    background-repeat: no-repeat;
    background-size: cover;
    background-attachment: fixed;
    color: white;
    font-family: Arial, sans-serif;
    overflow: hidden;
}

.banner {
    text-align: center;
    margin-top: 20px;
}

.banner img {
    width: auto;
    height: auto;
    max-width: none;
}

.content {
    position: absolute;
    bottom: 20px;
    left: 20px;
    max-width: 400px;
}

.content h1 {
    margin: 0 0 10px 0;
}

.content p {
    margin: 0;
    line-height: 1.5;
}

.links {
    margin-top: 10px;
}

.links a {
    color: #4da6ff;
    text-decoration: none;
    margin-right: 10px;
}

.links a:hover {
    text-decoration: underline;
}

.get-mod {
    position: absolute;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
}

.get-mod a {
    background: white;
    color: black;
    padding: 12px 24px;
    border-radius: 20px;
    text-decoration: none;
    font-weight: bold;
}

.get-mod a:hover {
    opacity: 0.9;
}
</style>
</head>

<body>

<div class="banner">
    <img src="logo.png" alt="TALE-STARS Logo">
</div>

<div class="content">
    <h1>Tale Stars</h1>
    <p>
        Tale Stars is a mod developed for Brawl Stars. It has a free test version as well as paid features.
    </p>
    <div class="links">
        <a href="#">Discord</a>
        <a href="#">Telegram</a>
    </div>
</div>

<div class="get-mod">
    <a href="BURAYA LINKI KOY">Get Mod</a>
</div>

</body>
</html>
